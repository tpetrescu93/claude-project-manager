name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run webpack

      - name: Package
        run: npx vsce package --out project-manager-fork.vsix

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: "Auto-built from ${{ github.sha }}"
          files: project-manager-fork.vsix
          make_latest: true
